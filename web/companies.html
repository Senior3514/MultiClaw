<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MultiClaw Companies</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="auth-pending">
    <div class="site-shell">
      <header class="site-header">
        <a class="brand-inline" href="./index.html">
          <div class="brand-mark">M</div>
          <div>
            <div class="eyebrow">AI organization foundry</div>
            <strong>MultiClaw</strong>
          </div>
        </a>
        <nav class="site-nav">
          <a href="./index.html">Home</a>
          <a href="./install.html">Install</a>
          <a href="./walkthrough.html">Walkthrough</a>
          <a href="./dashboard.html">Workspace</a>
          <a href="./generator.html">Generator</a>
          <a href="./companies.html">Companies</a>
          <a href="https://github.com/Senior3514/MultiClaw" target="_blank" rel="noreferrer">GitHub</a>
        </nav>
        <div id="sessionArea" class="session-area"></div>
      </header>

      <main class="site-main">
        <section class="panel section-block">
          <div class="section-heading">
            <div>
              <div class="eyebrow">Generated companies</div>
              <h1>Browse the companies created by MultiClaw.</h1>
            </div>
          </div>
          <div id="companiesStatus" class="status-banner status-idle">Loading generated companies...</div>
          <div class="form-panel companies-filters">
            <label>
              <span>Search</span>
              <input id="companiesSearch" placeholder="Search by name, description, or ID" />
            </label>
            <label>
              <span>Product origin</span>
              <select id="companiesProductOrigin">
                <option value="">All</option>
                <option>Existing product</option>
                <option>Homegrown app</option>
                <option>New product idea</option>
                <option>Internal tool</option>
              </select>
            </label>
            <label>
              <span>Autonomy mode</span>
              <select id="companiesAutonomyMode">
                <option value="">All</option>
                <option>Advisory</option>
                <option>Operator-assisted</option>
                <option>Full autonomous</option>
              </select>
            </label>
          </div>
        </section>

        <section id="companiesGrid" class="cards-grid"></section>
      </main>
    </div>

    <script type="module" src="./companies.js"></script>
  </body>
</html>
