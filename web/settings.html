<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MultiClaw Settings</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <a class="brand-inline" href="./index.html">
          <div class="brand-mark">M</div>
          <div>
            <div class="eyebrow">AI organization foundry</div>
            <strong>MultiClaw</strong>
          </div>
        </a>
        <nav class="site-nav">
          <a href="./dashboard.html">Dashboard</a>
          <a href="./generator.html">Generator</a>
          <a href="./companies.html">Companies</a>
          <a href="./settings.html">Settings</a>
        </nav>
        <div id="sessionArea" class="session-area"></div>
      </header>

      <main class="site-main auth-main">
        <section class="panel auth-panel">
          <div class="section-heading">
            <div>
              <div class="eyebrow">Workspace settings</div>
              <h1>Control how MultiClaw starts each generation.</h1>
            </div>
          </div>

          <div id="settingsStatus" class="status-banner status-idle">Adjust defaults for your preview workspace.</div>

          <div class="form-panel">
            <label>
              <span>Default product origin</span>
              <select id="defaultProductOrigin">
                <option>Existing product</option>
                <option>Homegrown app</option>
                <option>New product idea</option>
                <option>Internal tool</option>
              </select>
            </label>

            <label>
              <span>Default autonomy mode</span>
              <select id="defaultAutonomyMode">
                <option>Advisory</option>
                <option>Operator-assisted</option>
                <option>Full autonomous</option>
              </select>
            </label>

            <button id="saveSettingsBtn">Save settings</button>
          </div>
        </section>
      </main>

      <script type="module" src="./settings.js"></script>
    </div>
  </body>
</html>
